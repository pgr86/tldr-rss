name: Update RSS

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron:  '0 12 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    name: Generate RSS
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: yarn install --frozen-lockfile
      - run: yarn run build
      # Restore the record of articles already posted to Twitter so that only
      # genuinely new articles get tweeted. Rotating key + restore-keys prefix
      # because cache entries are immutable once written.
      - name: Restore Twitter posting state
        uses: actions/cache@v4
        with:
          path: .twitter-state
          key: twitter-state-${{ github.run_id }}
          restore-keys: |
            twitter-state-
      - run: yarn start
        env:
          MAX_DAYS: 10
          MAX_TWEETS_PER_RUN: 5
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET_KEY: ${{ secrets.TWITTER_API_SECRET_KEY }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: rss
          path: ./site
          if-no-files-found: error
          retention-days: 2
  deploy-to-github-pages:
    runs-on: ubuntu-latest
    name: Deploy RSS
    needs: [build-feed]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download page
        uses: actions/download-artifact@v4
        with:
          name: rss
          path: ./dist
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
